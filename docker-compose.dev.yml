services:
  # ─── Infrastructure ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula
      POSTGRES_DB: nebula
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services applicatifs ───
  api:
    build:
      context: .
      args:
        SERVICE: api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://nebula:nebula@postgres:5432/nebula
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ENV: development
      VERSION: 1.0.0
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: .
      args:
        SERVICE: web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development

  media:
    build:
      context: .
      args:
        SERVICE: media
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: nebula-media
      NODE_ENV: development
      VERSION: 1.0.0
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  notifications:
    build:
      context: .
      args:
        SERVICE: notifications
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ENV: development
      VERSION: 1.0.0
    depends_on:
      rabbitmq:
        condition: service_healthy

  search:
    build:
      context: .
      args:
        SERVICE: search
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      API_URL: http://api:3001
      NODE_ENV: development
      VERSION: 1.0.0
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
