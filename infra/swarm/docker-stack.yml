version: "3.8"

networks:
  public:
    driver: overlay
  internal:
    driver: overlay
    internal: true
  monitoring:
    driver: overlay

secrets:
  db_password:
    external: true
  db_url:
    external: true
  rabbitmq_password:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true

configs:
  prometheus_config:
    file: ./infra/monitoring/prometheus.yml
  grafana_datasource:
    file: ./infra/monitoring/grafana/provisioning/datasources/datasource.yml

services:
  traefik:
    image: traefik:v2.11
    command:
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=nebula_public"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--metrics.prometheus=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - monitoring
    deploy:
      placement:
        constraints:
          - node.role == manager
      replicas: 1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nebula
      POSTGRES_DB: nebula
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    networks:
      - internal
    deploy:
      replicas: 1

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nebula
      RABBITMQ_DEFAULT_PASS: rabbitmq123
    networks:
      - internal
    deploy:
      replicas: 1

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - miniodata:/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  api:
    image: ${REGISTRY:-axelpo}/nebula-api:${TAG:-latest}
    environment:
      PORT: 3001
      NODE_ENV: production
      VERSION: ${TAG:-latest}
      RABBITMQ_URL: amqp://nebula:rabbitmq123@rabbitmq:5672
    secrets:
      - db_url
    networks:
      - public
      - internal
      - monitoring
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.api.entrypoints=web"
        - "traefik.http.services.api.loadbalancer.server.port=3001"
        - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
        - "traefik.http.routers.api.middlewares=api-strip"

  web:
    image: ${REGISTRY:-axelpo}/nebula-web:${TAG:-latest}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    networks:
      - public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.web.rule=PathPrefix(`/`)"
        - "traefik.http.routers.web.entrypoints=web"
        - "traefik.http.routers.web.priority=1"
        - "traefik.http.services.web.loadbalancer.server.port=3000"

  media:
    image: ${REGISTRY:-axelpo}/nebula-media:${TAG:-latest}
    environment:
      PORT: 3003
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: nebula-media
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      RABBITMQ_URL: amqp://nebula:rabbitmq123@rabbitmq:5672
      NODE_ENV: production
      VERSION: ${TAG:-latest}
    networks:
      - public
      - internal
      - monitoring
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.media.rule=PathPrefix(`/media`)"
        - "traefik.http.routers.media.entrypoints=web"
        - "traefik.http.services.media.loadbalancer.server.port=3003"
        - "traefik.http.middlewares.media-strip.stripprefix.prefixes=/media"
        - "traefik.http.routers.media.middlewares=media-strip"

  notifications:
    image: ${REGISTRY:-axelpo}/nebula-notifications:${TAG:-latest}
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://nebula:rabbitmq123@rabbitmq:5672
      NODE_ENV: production
      VERSION: ${TAG:-latest}
    networks:
      - internal
      - monitoring
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first

  search:
    image: ${REGISTRY:-axelpo}/nebula-search:${TAG:-latest}
    environment:
      PORT: 3005
      API_URL: http://api:3001
      NODE_ENV: production
      VERSION: ${TAG:-latest}
    networks:
      - public
      - internal
      - monitoring
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.search.rule=PathPrefix(`/search`)"
        - "traefik.http.routers.search.entrypoints=web"
        - "traefik.http.services.search.loadbalancer.server.port=3005"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - monitoring
      - internal
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
        - "traefik.http.routers.prometheus.entrypoints=web"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - monitoring
      - public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
        - "traefik.http.routers.grafana.entrypoints=web"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - monitoring
    deploy:
      mode: global

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    deploy:
      mode: global

volumes:
  pgdata:
  miniodata:
  prometheus_data:
  grafana_data:
